<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

  <!-- Dark background -->
  <rect width="256" height="256" rx="44" fill="#0a1120"/>

  <!-- Outer rounded border (matches the icon's outer frame) -->
  <rect x="14" y="14" width="228" height="228" rx="36" fill="none" stroke="#00d4aa" stroke-width="10"/>

  <!-- ── Left side: stacked ledger cards ── -->

  <!-- Card 1 (leftmost, tallest) -->
  <rect x="32" y="52" width="46" height="152" rx="6" fill="none" stroke="#00d4aa" stroke-width="7"/>
  <!-- Tab on top of card 1 -->
  <rect x="36" y="38" width="14" height="20" rx="4" fill="none" stroke="#00d4aa" stroke-width="7"/>

  <!-- Card 2 -->
  <rect x="84" y="52" width="38" height="152" rx="6" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>
  <!-- Tab on top of card 2 -->
  <rect x="88" y="38" width="14" height="20" rx="4" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>

  <!-- Card 3 -->
  <rect x="128" y="52" width="38" height="152" rx="6" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>
  <!-- Tab on top of card 3 -->
  <rect x="132" y="38" width="14" height="20" rx="4" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>

  <!-- Card 4 (rightmost slim) -->
  <rect x="172" y="52" width="28" height="152" rx="6" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>
  <!-- Tab on top of card 4 -->
  <rect x="175" y="38" width="14" height="20" rx="4" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>

  <!-- ── Right foreground: document / form ── -->
  <!-- Document body (overlaps the cards) -->
  <rect x="118" y="118" width="118" height="110" rx="10" fill="#0a1120" stroke="#00d4aa" stroke-width="7"/>

  <!-- Document header box -->
  <rect x="130" y="130" width="94" height="22" rx="5" fill="none" stroke="#00d4aa" stroke-width="6"/>

  <!-- Document text lines (label + value pairs) -->
  <!-- Row 1 -->
  <line x1="130" y1="168" x2="186" y2="168" stroke="#00d4aa" stroke-width="6" stroke-linecap="round"/>
  <line x1="196" y1="168" x2="224" y2="168" stroke="#00d4aa" stroke-width="6" stroke-linecap="round"/>

  <!-- Row 2 -->
  <line x1="130" y1="186" x2="186" y2="186" stroke="#00d4aa" stroke-width="6" stroke-linecap="round"/>
  <line x1="196" y1="186" x2="224" y2="186" stroke="#00d4aa" stroke-width="6" stroke-linecap="round"/>

  <!-- Row 3 -->
  <line x1="130" y1="204" x2="186" y2="204" stroke="#00d4aa" stroke-width="6" stroke-linecap="round"/>
  <line x1="196" y1="204" x2="224" y2="204" stroke="#00d4aa" stroke-width="6" stroke-linecap="round"/>

</svg>
